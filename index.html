async function generateText(prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ role:"user", parts:[{ text: prompt }] }],
      generationConfig: {
        temperature: 0.8,
        responseMimeType: "application/json"
      }
    })
  });
  if (!res.ok) throw new Error((await res.json()).error?.message || res.statusText);
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function generateImage(prompt) {
  const candidates = [
    "gemini-2.5-flash-image-preview",
    "gemini-2.5-flash-image",
    "gemini-2.0-flash-preview-image-generation",
    "gemini-2.0-flash-exp-image-generation"
  ];
  const errors = [];
  for (const model of candidates) {
    try {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ role:"user", parts:[{ text: prompt }] }],
          generationConfig: { responseModalities: ["TEXT","IMAGE"] }
        })
      });
      if (!res.ok) {
        const errText = await res.text();
        console.warn(`${model} failed:`, errText);
        errors.push(`${model}: ${res.status}`);
        continue;
      }
      const data = await res.json();
      const parts = data.candidates?.[0]?.content?.parts || [];
      for (const p of parts) {
        if (p.inlineData) return "data:" + p.inlineData.mimeType + ";base64," + p.inlineData.data;
      }
      errors.push(`${model}: no image in response`);
    } catch (e) {
      console.warn(model, e);
      errors.push(`${model}: ${e.message}`);
    }
  }
  throw new Error("All image models failed. " + errors.join(" | "));
}

    localStorage.setItem("gemini_api_key", k);
    GEMINI_API_KEY = k;
    setApiKey(k);

    GEMINI_API_KEY = "";

  async function handleGenerate() {
    setError("");
    if (!apiKey) { setError(L.needKey); return; }
    if (!behavior.trim()) { setError(L.needBehavior); return; }

    setLoading(true);
    try {
      setStatus(L.generating);
      const isBoth = storyLang === "both";
      const langLabel = isBoth
        ? "BOTH Thai (ภาษาไทย) AND English"
        : (storyLang === "th" ? "Thai language (ภาษาไทย)" : "English");
      const userName = childName.trim();

      const nameInstruction = userName
        ? `The main character's name is "${userName}".`
        : `Invent a cute, culturally appropriate name for the main character yourself${isBoth ? " (use a name that works for both Thai and English audiences, e.g., a short nickname)" : (storyLang==="th" ? " (a Thai nickname)" : " (an English first name)")}.`;

      const hasThai = isBoth || storyLang === "th";
      const lengthSpec = storyLength === "short"
        ? { pages: "exactly 5 to 6", sentences: "2-4 short sentences" }
        : storyLength === "long"
        ? { pages: "exactly 12 to 15", sentences: "4-6 sentences" }
        : { pages: "exactly 8 to 10", sentences: "3-5 sentences" };

      // Thai text: natural, easy to understand, engaging storytelling (NOT forced rhyme)
      const thaiStyleNote = "เขียนภาษาไทยให้เป็นธรรมชาติ อ่านเข้าใจง่าย ใช้คำง่ายๆ เหมาะกับเด็กอายุ " + age + " ปี เล่าเรื่องให้น่าสนใจชวนติดตามจนจบ มีจังหวะการเล่าที่ลื่นไหล ใช้บทสนทนาสั้นๆ ได้เพื่อเพิ่มความมีชีวิตชีวา หลีกเลี่ยงการบังคับให้คล้องจองจนประโยคแข็งหรือแปลก เน้นความเข้าใจและอารมณ์ของเรื่องเป็นหลัก";
      const textShape = isBoth
        ? `"text_th": "page text in natural easy-to-read Thai (${lengthSpec.sentences}, engaging storytelling, NOT rhyming verse)", "text_en": "page text in English (${lengthSpec.sentences}, same meaning as Thai)"`
        : (storyLang === "th"
          ? `"text": "page text in natural easy-to-read Thai (${lengthSpec.sentences}, engaging storytelling, NOT rhyming verse)"`
          : `"text": "page text in English (${lengthSpec.sentences}, age-appropriate for age ${age})"`);

      const titleShape = isBoth
        ? `"title_th": "title in Thai", "title_en": "title in English"`
        : `"title": "story title in ${langLabel}"`;

      const moralShape = isBoth
        ? `"moral_th": "1-2 sentence takeaway in Thai", "moral_en": "1-2 sentence takeaway in English"`
        : `"moral": "1-2 sentence positive takeaway in ${langLabel}"`;

      const themeInstructions = {
        behavior: `a warm non-shaming story that gently guides this behavior: "${behavior}". Show the positive behavior through a relatable character's journey, never lecture.`,
        inspire: `an inspirational dream-big story about this aspiration: "${behavior}". Show the character imagining, trying, facing tiny setbacks, and discovering that small daily efforts lead to big dreams. End on a hopeful note that inspires action.`,
        moral: `a moral-values story teaching this virtue: "${behavior}". The character learns the value naturally through a small meaningful event, experiences the reward of acting well, and feels proud.`,
        courage: `a brave-hearted story about overcoming this fear or challenge: "${behavior}". The character feels afraid (that's okay), takes one small brave step, discovers courage grows with practice, and feels proud at the end.`,
        friendship: `a heartwarming friendship story about: "${behavior}". Show empathy, kind words, small acts of friendship, and the joy of connection.`,
        emotion: `a gentle emotional-literacy story about this feeling: "${behavior}". Name the feeling clearly, show it's okay to feel it, offer a healthy way to cope, and end with the character feeling better and understood.`,
        curiosity: `a curious explorer story about this wonder: "${behavior}". The character asks questions, discovers fun kid-friendly facts, and celebrates learning. Include 2-3 simple true facts woven into the story.`,
        family: `a tender family-love story about: "${behavior}". Show warmth, simple everyday moments, and gentle emotional connection between family members.`,
        selfcare: `a cheerful self-care story about this healthy habit: "${behavior}". Make the habit feel fun and empowering, not like a chore.`,
        adventure: `an imaginative adventure story inspired by: "${behavior}". Include a magical twist, a small challenge the character solves with kindness or cleverness, and a safe happy return.`
      };
      const themeInstruction = themeInstructions[theme] || themeInstructions.behavior;

      const prompt = `You are a gentle children's book author. Write a short heartwarming story for a ${age}-year-old child: ${themeInstruction}
Output language: ${langLabel}.
${nameInstruction}
${hasThai ? thaiStyleNote : ""}

CRITICAL for illustration consistency:
- Decide the character's gender ONCE (boy or girl) and stick to it for the entire book.
- Create ONE detailed character description and reuse it in every scene.
- Every page's main character MUST be the same gender, same age, same hair, same outfit.

Return ONLY valid JSON (no markdown fence) in this shape:
{
  ${titleShape},
  "character_name": "the main character's name",
  "character_gender": "boy" OR "girl" (pick ONE and be consistent),
  "character_description": "ONE detailed English visual description of the main character. MUST start with gender + age + ethnicity, then hair (color, length, style), eyes, exact outfit (specific clothing items and colors), any accessory. Be very specific so every illustration shows the SAME child. Example: 'a cheerful 5-year-old Thai GIRL with round face, fair skin, shoulder-length black hair in twin ponytails with red ribbons, big brown eyes, wearing a yellow t-shirt with a sunflower print, blue denim overalls, white sneakers'",
  "pages": [
    { ${textShape},
      "scene": "English description of ONLY the setting, action, mood, and other characters in this scene. Do NOT re-describe the main character. Example: 'sitting at a wooden breakfast table in a sunny kitchen, looking at a plate of vegetables with curiosity, warm morning light'" }
  ],
  ${moralShape}
}
Total pages: ${lengthSpec.pages}. Develop with clear beginning (introduce character + context), middle (journey and small meaningful events), and end (positive uplifting resolution).${isBoth ? " The Thai and English versions must convey the same meaning per page." : ""}`;

      const raw = await generateText(prompt);
      const data = JSON.parse(raw);

      // Normalize to unified shape regardless of language mode
      if (isBoth) {
        data.title = `${data.title_th || ""}\n${data.title_en || ""}`.trim();
        data.moral = `${data.moral_th || ""}\n\n${data.moral_en || ""}`.trim();
        data.pages = data.pages.map(p => ({
          ...p,
          text: `${p.text_th || ""}\n\n${p.text_en || ""}`.trim()
        }));
      }
      const name = data.character_name || (storyLang==="en" ? "the child" : "น้องหนู");

      const pageCount = data.pages.length;
      const pickIdx = [];
      for (let i=0; i<numImages; i++) pickIdx.push(Math.floor(i * pageCount / numImages));

      const style = "soft pastel watercolor children's book illustration, warm cheerful, cute chibi style, simple rounded shapes, dreamy soft lighting, no text, no words, no letters";
      const gender = (data.character_gender || "").toLowerCase().includes("girl") ? "GIRL" : (data.character_gender || "").toLowerCase().includes("boy") ? "BOY" : "CHILD";
      const charDesc = data.character_description || `a ${age}-year-old child`;
      // Emphasize gender strongly to prevent image model from flipping it
      const genderLock = `The main character is a ${gender} (${gender.toLowerCase()}). This MUST be a ${gender.toLowerCase()} in every single illustration — NEVER change the gender.`;

      setStatus(`${L.generatingImg} (${L.cover})`);
      const coverImg = await generateImage(`${genderLock} Children's book cover illustration featuring ${charDesc}. Scene: this ${gender.toLowerCase()} smiling, standing in a cheerful magical setting related to the story. ${style}`);

      const images = {};
      for (let i=0; i<pickIdx.length; i++) {
        const idx = pickIdx[i];
        setStatus(`${L.generatingImg} ${i+1}/${pickIdx.length}`);
        // Prepend gender lock + character description to every scene for visual consistency
        images[idx] = await generateImage(`${genderLock} Character: ${charDesc}. This is the EXACT SAME ${gender.toLowerCase()} from previous illustrations — keep gender, hair, outfit, face, and all features IDENTICAL. Scene: ${data.pages[idx].scene}. ${style}`);
      }

      setStory({ ...data, images, coverImg, childName: name, storyLang });
    } catch (e) {
      setError(L.err + e.message);
    } finally {
      setLoading(false);
      setStatus("");
    }
  }

  async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
    const pages = document.querySelectorAll(".pdf-page");
    for (let i=0; i<pages.length; i++) {
      const canvas = await html2canvas(pages[i], { scale: 2, backgroundColor: "#fffdf7", useCORS: true });
      const img = canvas.toDataURL("image/jpeg", 0.9);
      if (i>0) pdf.addPage();
      pdf.addImage(img, "JPEG", 0, 0, 210, 297);
    }
    pdf.save(`${story.title.replace(/[^\w\u0E00-\u0E7F]+/g,'_')}.pdf`);
  }

  async function downloadPPTX() {
    const pptx = new PptxGenJS();
    pptx.layout = "LAYOUT_WIDE"; // 13.33 x 7.5 inches
    const W = 13.33, H = 7.5;

    // Cover slide
    const s0 = pptx.addSlide();
    s0.background = { color: "FBBF24" };
    s0.addImage({ data: story.coverImg, x: W/2 - 2.5, y: 0.5, w: 5, h: 5 });
    s0.addText(story.title, { x: 0.5, y: 5.7, w: W-1, h: 1, fontSize: 40, bold: true, color: "FFFFFF", align: "center", fontFace: "Kanit" });
